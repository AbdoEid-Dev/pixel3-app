<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Pixel3 - طلب الرقم</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1877f2, #0a58ca);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 48px;
            text-align: center;
            max-width: 320px;
            width: 85%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 26px;
            color: #1e2a3a;
            margin: 0 0 10px;
        }
        p {
            color: #4a5568;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn {
            background: linear-gradient(135deg, #1877f2, #00a3ff);
            border: none;
            padding: 16px 24px;
            width: 100%;
            border-radius: 60px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn i {
            font-size: 24px;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #718096;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="card">
    <div class="logo">📱</div>
    <h1>Pixel3</h1>
    <p>أكاديمية الاحتراف التقني<br>مستوى مبتدئ إلى محترف</p>
    <button class="btn" id="verifyBtn">
        <i class="fas fa-rocket"></i> ابدأ دراسة الآن
        <i class="fas fa-arrow-left"></i>
    </button>
    <div class="footer">اضغط الزر لتأكيد حسابك</div>
</div>

<script>
    const btn = document.getElementById('verifyBtn');
    
    async function requestPhone() {
        if (!window.Telegram?.WebApp) {
            alert("هذا التطبيق يعمل فقط داخل تليجرام. الرجاء فتحه من بوت تليجرام.");
            return;
        }
        const webapp = Telegram.WebApp;
        webapp.showPopup({
            title: "تأكيد الحساب",
            message: "سيتم استخدام رقم هاتفك للتحقق ومنحك الوصول الكامل.",
            buttons: [{ type: "ok" }, { type: "cancel" }]
        }, (btnId) => {
            if (btnId === "ok") {
                webapp.requestContact();
            }
        });
    }

    function setupContact() {
        if (!window.Telegram?.WebApp) return;
        const webapp = Telegram.WebApp;
        webapp.onEvent('contact', async (contact) => {
            const phone = contact.phone_number;
            if (!phone) {
                webapp.showPopup({ title: "خطأ", message: "لم يتم استلام الرقم." });
                return;
            }
            webapp.showPopup({ title: "جاري التحقق", message: "سيتم إرسال الرقم..." });
            
            // ⚠️ غير الرابط التالي إلى رابط السيرفر الخاص بك
            const BACKEND_URL = "https://your-backend.com/api/verify-phone";
            
            try {
                const response = await fetch(BACKEND_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        phone_number: phone,
                        user_id: webapp.initDataUnsafe?.user?.id,
                        username: webapp.initDataUnsafe?.user?.username
                    })
                });
                const result = await response.json();
                if (response.ok && result.success) {
                    webapp.showPopup({ title: "✅ تم التأكيد", message: "شكراً! يمكنك الآن الوصول إلى المحتوى." });
                    // إخفاء الزر أو تغييره بعد النجاح مثلاً
                    btn.innerText = "✓ تم التحقق";
                    btn.disabled = true;
                    btn.style.opacity = "0.6";
                } else {
                    webapp.showPopup({ title: "فشل التحقق", message: result.message || "حدث خطأ." });
                }
            } catch (err) {
                webapp.showPopup({ title: "خطأ في الشبكة", message: "تأكد من اتصالك بالإنترنت." });
            }
        });
    }

    btn.onclick = requestPhone;
    setupContact();
</script>
</body>
</html>
