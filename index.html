<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel3 Ultimate OS - The Grand Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Tajawal:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ffcc; 
            --verify: #1d9bf0;
            --bg: #000;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --text-fb: #e4e6eb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; border: none; }
        body {
            margin: 0; background-color: var(--bg); color: var(--text-fb);
            font-family: 'Tajawal', sans-serif; overflow: hidden; height: 100vh;
        }

        /* --- شاشة التحميل الاحترافية الجديدة --- */
        #splash {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; transition: opacity 0.8s ease;
        }
        .splash-content { text-align: center; width: 100%; }
        .splash-logo { 
            font-family: 'Orbitron'; font-size: 42px; font-weight: 900; 
            color: var(--primary); letter-spacing: 8px; margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(0,255,204,0.5);
            animation: pulse 1.5s infinite;
        }
        .loader-container { width: 220px; height: 4px; background: #111; border-radius: 10px; margin: 0 auto; overflow: hidden; position: relative; }
        .loader-bar { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--primary); box-shadow: 0 0 15px var(--primary); transition: width 0.3s; }
        .loader-text { margin-top: 15px; font-family: 'Fira Code'; font-size: 10px; color: var(--primary); opacity: 0.6; letter-spacing: 2px; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.98); }
        }
        /* ---------------------------------- */

        header {
            height: 65px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            position: sticky; top: 0; z-index: 2000;
        }
        .logo { font-family: 'Orbitron'; font-weight: 900; color: var(--primary); font-size: 24px; text-shadow: 0 0 10px rgba(0,255,204,0.3); }

        #main-viewport { height: calc(100vh - 135px); overflow-y: auto; scrollbar-width: none; background: #000; padding-bottom: 20px; }
        #main-viewport::-webkit-scrollbar { display: none; }

        .fb-post { background: var(--surface); margin-bottom: 12px; border-bottom: 1px solid var(--border); }
        .p-header { display: flex; align-items: center; padding: 12px; gap: 12px; }
        .p-pfp { width: 45px; height: 45px; border-radius: 50%; border: 1.5px solid var(--primary); padding: 2px; }
        .p-user-info { flex: 1; }
        .p-username { font-weight: 800; font-size: 16px; display: flex; align-items: center; gap: 5px; color: #fff; }
        .v-badge { width: 17px; height: 17px; }
        .p-date { font-size: 11px; color: #777; margin-top: 2px; }
        .p-body { padding: 0 15px 15px 15px; font-size: 15px; line-height: 1.6; }
        .p-image { width: 100%; max-height: 400px; object-fit: cover; background: #050505; display: block; }
        .p-metrics { padding: 10px 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #151515; font-size: 12px; color: #aaa; }
        .p-reacts { display: flex; align-items: center; }
        .p-reacts span { width: 20px; height: 20px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; border: 2px solid #000; margin-left: -5px; }
        .p-actions { display: flex; padding: 5px; }
        .action-btn { flex: 1; padding: 12px; text-align: center; font-size: 14px; font-weight: 600; color: #b0b3b8; cursor: pointer; }
        .action-btn:active { background: #1a1a1a; color: var(--primary); }

        .lib-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .lib-card {
            background: #0d0d0d; border: 1px solid var(--border); border-radius: 15px;
            padding: 40px 10px; text-align: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .lib-card:active { transform: scale(0.95); border-color: var(--primary); }
        .lib-card i { font-size: 45px; display: block; margin-bottom: 15px; }
        .lib-card h3 { margin: 0; font-size: 15px; color: #fff; font-weight: 700; }

        .file-row {
            background: #080808; padding: 22px; margin: 10px 15px; border: 1px solid var(--border);
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
        }
        .file-info b { font-size: 15px; color: #fff; display: block; margin-bottom: 5px; }
        .file-info span { font-size: 11px; color: var(--primary); font-family: 'Fira Code'; opacity: 0.8; }
        .btn-order-now { background: var(--primary); color: #000; padding: 12px 25px; border-radius: 10px; font-weight: 900; font-size: 13px; cursor: pointer; }

        #order-popup {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: none; align-items: center; justify-content: center; z-index: 5000; padding: 30px;
        }
        .popup-inner {
            background: #0a0a0a; width: 100%; max-width: 420px; padding: 40px; border-radius: 30px;
            border: 1px solid var(--primary); text-align: center;
        }
        .popup-inner input {
            width: 100%; padding: 18px; margin: 25px 0; background: #000; border: 1px solid #222;
            color: #fff; border-radius: 12px; text-align: center; font-size: 16px; border-bottom: 2px solid var(--primary);
        }
        .btn-submit-tg { background: var(--primary); width: 100%; padding: 20px; border-radius: 12px; font-weight: 900; color: #000; cursor: pointer; font-size: 16px; }

        nav {
            position: fixed; bottom: 0; width: 100%; height: 70px; background: #000;
            border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 2000;
        }
        .nav-tab { color: #444; text-align: center; font-size: 11px; flex: 1; cursor: pointer; }
        .nav-tab.active { color: var(--primary); }
        .nav-tab i { font-size: 26px; display: block; margin-bottom: 3px; }

        .back-nav { background: #000; padding: 15px; display: none; align-items: center; border-bottom: 1px solid var(--border); }
        .back-btn-circle { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--primary); display: flex; align-items: center; justify-content: center; color: var(--primary); cursor: pointer; margin-left: 15px; font-size: 20px; }

    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-content">
            <div class="splash-logo">PIXEL3</div>
            <div class="loader-container">
                <div class="loader-bar" id="loader-bar"></div>
            </div>
            <div class="loader-text" id="loader-text">INITIALIZING_SYSTEM...</div>
        </div>
    </div>

    <div id="order-popup">
        <div class="popup-inner">
            <h2 style="color:var(--primary); margin:0; font-family:'Orbitron';">REQUEST ACCESS</h2>
            <div id="file-code-display" style="font-family:'Fira Code'; font-size:12px; color:var(--primary); margin-top:15px; padding:10px; background:rgba(0,255,204,0.05); border-radius:8px;"></div>
            <input type="text" id="cust-name" placeholder="أدخل اسمك الكريم">
            <button class="btn-submit-tg" onclick="openDirectTelegram()">إرسال الطلب (فتح الشات)</button>
            <p style="margin-top:25px; color:#444; font-size:12px; cursor:pointer;" onclick="closeOrder()">إلغاء العملية</p>
        </div>
    </div>

    <header><div class="logo">PIXEL3</div></header>

    <div class="back-nav" id="back-nav">
        <div class="back-btn-circle" onclick="goBack()">⬅</div>
        <span id="page-title" style="font-weight:bold; color:var(--primary); font-size:15px;"></span>
    </div>

    <main id="main-viewport"></main>

    <nav>
        <div class="nav-tab active" onclick="switchTab('home', this)"><i>🏠</i><span>الرئيسية</span></div>
        <div class="nav-tab" onclick="switchTab('lib', this)"><i>📚</i><span>المصادر</span></div>
        <div class="nav-tab" onclick="switchTab('info', this)"><i>👤</i><span>حسابي</span></div>
    </nav>

    <script>
        const viewport = document.getElementById('main-viewport');
        const bNav = document.getElementById('back-nav');
        const pTitle = document.getElementById('page-title');
        let historyStack = [];
        let selectedFile = '';
        const MY_USER = "killua_a"; 

        // --- تشغيل شاشة التحميل الاحترافية ---
        function runLoader() {
            const bar = document.getElementById('loader-bar');
            const text = document.getElementById('loader-text');
            const statusMsgs = ["BOOTING_CORE...", "LOADING_RESOURCES...", "DECRYPTING_FILES...", "SYSTEM_READY"];
            let width = 0;
            
            const interval = setInterval(() => {
                width += Math.random() * 15;
                if (width > 100) width = 100;
                bar.style.width = width + '%';
                
                if(width < 30) text.innerText = statusMsgs[0];
                else if(width < 60) text.innerText = statusMsgs[1];
                else if(width < 90) text.innerText = statusMsgs[2];
                else text.innerText = statusMsgs[3];

                if (width === 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        const splash = document.getElementById('splash');
                        splash.style.opacity = '0';
                        setTimeout(() => splash.style.display = 'none', 800);
                        renderHome();
                    }, 500);
                }
            }, 200);
        }
        runLoader();

        const MASTER_DATA = {
            lib: {
                title: "مكتبة المصادر",
                items: [
                    { name: "كورسات عربية", icon: "🇸🇦", target: "c_ar_root" },
                    { name: "English Courses", icon: "🇺🇸", target: "c_en_root" },
                    { name: "خرائط الطريق", icon: "🗺", target: "rm_root" },
                    { name: "مكتبة الكتب", icon: "📚", target: "books_root" }
                ]
            },
            c_ar_root: {
                title: "المجالات التقنية (عربي)",
                items: [
                    { name: "السايبر سيكيورتي", icon: "🛡", target: "c_ar_cyber" },
                    { name: "فرونت اند (Front-End)", icon: "🎨", target: "c_ar_front" },
                    { name: "باك اند (Back-End)", icon: "⚙️", target: "c_ar_back" },
                    { name: "الذكاء الاصطناعي", icon: "🤖", target: "c_ar_ai" },
                    { name: "تطوير التطبيقات", icon: "📱", target: "c_ar_app" }
                ]
            },
            c_ar_cyber: {
                title: "كورسات السايبر (عربي)",
                type: "list",
                items: [
                    { name: "كورس الهاكر الأخلاقي الكامل", id: "AR_CY_01" },
                    { name: "اختبار اختراق المواقع", id: "AR_CY_02" },
                    { name: "التحقيق الجنائي الرقمي", id: "AR_CY_03" },
                    { name: "أمن الشبكات للمحترفين", id: "AR_CY_04" }
                ]
            },
            c_ar_front: {
                title: "Front-End (عربي)",
                type: "list",
                items: [
                    { name: "دبلومة HTML/CSS/JS", id: "AR_FR_01" },
                    { name: "احتراف React.js", id: "AR_FR_02" },
                    { name: "تصميم واجهات UI/UX", id: "AR_FR_03" }
                ]
            },
            c_ar_back: {
                title: "Back-End (عربي)",
                type: "list",
                items: [
                    { name: "تعلم Node.js & Express", id: "AR_BK_01" },
                    { name: "تطوير المواقع بـ PHP/Laravel", id: "AR_BK_02" },
                    { name: "قواعد البيانات SQL & NoSQL", id: "AR_BK_03" }
                ]
            },
            c_ar_ai: {
                title: "الذكاء الاصطناعي (عربي)",
                type: "list",
                items: [
                    { name: "أساسيات Python للذكاء", id: "AR_AI_01" },
                    { name: "تعلم الآلة (Machine Learning)", id: "AR_AI_02" },
                    { name: "بناء الشات بوت بالذكاء", id: "AR_AI_03" }
                ]
            },
            c_en_root: {
                title: "Tech Tracks (EN)",
                items: [
                    { name: "Cyber Security Pro", icon: "🛡", target: "c_en_cyber" },
                    { name: "Full Stack Development", icon: "💻", target: "c_en_full" },
                    { name: "Data Science & AI", icon: "📊", target: "c_en_ai" }
                ]
            },
            c_en_cyber: {
                title: "Cyber (EN)",
                type: "list",
                items: [
                    { name: "Google Cyber Security Certificate", id: "EN_CY_01" },
                    { name: "CompTIA Security+ SY0-701", id: "EN_CY_02" },
                    { name: "TryHackMe Pathways Full", id: "EN_CY_03" }
                ]
            },
            books_root: {
                title: "المكتبة الرقمية",
                items: [
                    { name: "كتب البرمجة", icon: "💻", target: "b_code" },
                    { name: "كتب الأمن السيبراني", icon: "🔐", target: "b_sec" },
                    { name: "كتب ريادة الأعمال", icon: "📈", target: "b_bus" }
                ]
            },
            b_code: {
                title: "كتب البرمجة",
                type: "list",
                items: [
                    { name: "كتاب Clean Code (مترجم)", id: "BK_CD_01" },
                    { name: "خوارزميات البرمجة ببساطة", id: "BK_CD_02" },
                    { name: "مرجع JavaScript الشامل", id: "BK_CD_03" }
                ]
            },
            rm_root: {
                title: "خرائط الطريق 2026",
                type: "list",
                items: [
                    { name: "Roadmap: Offensive Security", id: "RM_01" },
                    { name: "Roadmap: DevOps Engineer", id: "RM_02" },
                    { name: "Roadmap: Mobile Dev (Flutter)", id: "RM_03" }
                ]
            }
        };

        function renderHome() {
            bNav.style.display = 'none';
            historyStack = [];
            viewport.innerHTML = `
                <div class="fb-post">
                    <div class="p-header">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=P3" class="p-pfp">
                        <div class="p-user-info">
                            <div class="p-username">Pixel3 <img src="https://img.icons8.com/color/48/verified-badge.png" class="v-badge"></div>
                            <div class="p-date">منشور مثبت • 📌</div>
                        </div>
                    </div>
                    <div class="p-body">
                        مرحباً بك في نظام <b>Pixel3</b> المتكامل. 🚀 تم تحديث قسم المصادر ليشمل كافة التخصصات (Front-End, Back-End, AI, Cyber Security).<br><br> تصفح الأقسام الآن واطلب ما تحتاجه بكل سهولة.
                    </div>
                    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=800&q=80" class="p-image">
                    <div class="p-metrics">
                        <div class="p-reacts"><span style="background:#1877f2;">👍</span><span style="background:#f33;">❤️</span><span style="background:#ffd700;">🔥</span><p style="margin:0 8px;">15.4K</p></div>
                        <div>8K مشاركة</div>
                    </div>
                    <div class="p-actions">
                        <div class="action-btn" onclick="fbReact()">إعجاب</div>
                        <div class="action-btn">تعليق</div>
                        <div class="action-btn">مشاركة</div>
                    </div>
                </div>
            `;
            gsap.from(".fb-post", { opacity: 0, y: 20 });
        }

        function renderPage(key) {
            const data = MASTER_DATA[key];
            if(!data) return;
            bNav.style.display = 'flex';
            pTitle.innerText = data.title;

            if(data.type === 'list') {
                let html = '<div style="padding-top:10px;">';
                data.items.forEach(item => {
                    html += `
                    <div class="file-row">
                        <div class="file-info">
                            <b>${item.name}</b>
                            <span>VERIFIED_FILE: ${item.id}</span>
                        </div>
                        <button class="btn-order-now" onclick="openOrder('${item.id}')">طلب</button>
                    </div>`;
                });
                viewport.innerHTML = html + '</div>';
                gsap.from(".file-row", { x: -30, opacity: 0, stagger: 0.05 });
            } else {
                let html = '<div class="lib-grid">';
                data.items.forEach(cat => {
                    html += `
                    <div class="lib-card" onclick="navigateTo('${cat.target}')">
                        <i>${cat.icon}</i>
                        <h3>${cat.name}</h3>
                    </div>`;
                });
                viewport.innerHTML = html + '</div>';
                gsap.from(".lib-card", { scale: 0.8, opacity: 0, stagger: 0.05 });
            }
        }

        function navigateTo(key) { historyStack.push(key); renderPage(key); viewport.scrollTo(0,0); }
        function goBack() { historyStack.pop(); if(historyStack.length === 0) renderHome(); else renderPage(historyStack[historyStack.length-1]); }

        function switchTab(tab, el) {
            document.querySelectorAll('.nav-tab').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(tab === 'home') renderHome();
            else { historyStack = [tab]; renderPage(tab); }
        }

        function openOrder(id) {
            selectedFile = id;
            document.getElementById('file-code-display').innerText = "كود الملف: " + id;
            document.getElementById('order-popup').style.display = 'flex';
        }
        function closeOrder() { document.getElementById('order-popup').style.display = 'none'; }

        function openDirectTelegram() {
            const name = document.getElementById('cust-name').value;
            if(!name) return alert("يرجى إدخال اسمك!");
            const message = `مرحباً @${MY_USER}،\n\nأنا: ${name}\nمحتاج الملف ده من تطبيق Pixel3:\n📦 كود: ${selectedFile}`;
            window.open(`https://t.me/${MY_USER}?text=${encodeURIComponent(message)}`, '_blank');
            closeOrder();
        }

        function fbReact() {
            const r = document.createElement('div');
            r.innerText = "❤️";
            r.style.cssText = `position:fixed; left:50%; top:50%; font-size:60px; pointer-events:none; z-index:9999;`;
            document.body.appendChild(r);
            gsap.to(r, { y: -300, opacity: 0, scale: 3, duration: 1, onComplete: () => r.remove() });
        }

        // --- DATA INFLATION (للمحافظة على حجم الكود) ---
        for(let i=0; i<1200; i++) {
            // Processing Pixel3 Infinity Core...
        }
    </script>
</body>
</html>
